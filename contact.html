<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | EasyTech Vancouver</title>
  <meta name="description" content="Contact EasyTech for fast local tech support. Send a request and get automatic confirmation email." />
  <meta name="robots" content="index, follow" />
  <link rel="icon" type="image/png" sizes="48x48" href="images/easytech-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {box-sizing:border-box;}
    body {margin:0;font-family:'Roboto',sans-serif;background:#f4f7fa;color:#333;line-height:1.6;scroll-behavior:smooth;}

    @keyframes gradientShift {0% {background-position:0% 50%;} 50% {background-position:100% 50%;} 100% {background-position:0% 50%;}}
    .hero {
      position: relative;
      background: linear-gradient(135deg,#1abc9c,#3498db,#9b59b6,#e74c3c);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color:#fff;
      text-align:center;
      padding:6rem 1rem;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      min-height:400px;
    }
    .hero::after {
      content:"";
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
      background: url('images/hero-tech-bg.png') center/cover no-repeat;
      opacity:0.2;
      z-index:0;
    }
    .hero img {height:250px;width:auto;margin-bottom:1rem;z-index:1;position:relative;}
    .hero h1 {font-size:clamp(2rem,6vw,3rem);margin:0.5rem 0;z-index:1;position:relative;}
    .hero .tagline {font-size:1.3rem;margin-bottom:1.5rem;opacity:0.9;z-index:1;}
    .hero p {font-size:1.2rem;margin-bottom:1rem;opacity:0.9;z-index:1;position:relative;}
    .hero .cta {background:#2ecc71;color:#fff;padding:1rem 1.6rem;border-radius:10px;text-decoration:none;font-weight:bold;transition:0.3s;z-index:1;position:relative;animation:pulse 2s infinite;}
    .hero .cta:hover {background:#27ae60;}
    .hero .cta-secondary {background:#34495e; margin-left:0.75rem;}
    .hero .cta-secondary:hover {background:#2b4c70;}
    @keyframes pulse {0%,100% {transform:scale(1);} 50% {transform:scale(1.05);}}
    @media(max-width:600px){.hero img {height:120px;}.footer-container{flex-direction:column;align-items:center;text-align:center;}}

    .container {max-width:900px; margin:0 auto; padding:30px 18px;}
    .card {background:#fff; border:1px solid #dde5ef; border-radius:10px; padding:24px; box-shadow:0 6px 24px rgba(0,0,0,0.06);}
    label {display:block; margin:.75rem 0 .25rem; font-weight:700;}
    input, textarea {width:100%; padding:12px 14px; border:1px solid #ccd6e6; border-radius:8px; font-size:1rem;}
    textarea {min-height:130px; resize:vertical;}
    button {background:#1abc9c; color:#fff; border:none; border-radius:8px; cursor:pointer; padding:12px 18px; font-size:1rem; font-weight:700; margin-top:14px;}
    button:hover {background:#15a589;}
    .small {font-size:0.92rem; color:#5d6f89;}
    .nav {margin-bottom:20px; display:flex; gap:12px;}
    .nav a {color:#1abc9c; font-weight:700; text-decoration:none;}
  </style>
</head>
<body>
  <header class="hero">
    <img src="images/easytech-logo.png" alt="EasyTech Logo - Metro Vancouver Tech Support" loading="lazy">
    <h1>Contact EasyTech</h1>
    <p class="tagline">Send us your request and we’ll reply quickly.</p>
    <p>Fast local IT support in Coquitlam, Burnaby, Surrey & Vancouver.</p>
    <a class="cta" href="https://wa.me/18194342389">Message on WhatsApp</a>
    <a class="cta cta-secondary" href="index.html">Go to Home</a>
  </header>

  <main class="container">
    <div class="card">
      <form id="contactForm" name="contact" method="POST" action="/api/contact">
        <input type="hidden" name="form-name" value="contact">

        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="John Doe" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="phone">Phone (optional)</label>
        <input type="tel" id="phone" name="phone" placeholder="819-434-2389">

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Describe your issue or question" required></textarea>

        <button type="submit">Send Request</button>
      </form>
      <p class="small">Your request will be sent to our support team and you’ll receive an immediate acknowledgement message in your inbox.</p>
    </div>
  </main>

  <script>
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      const payload = {
        name: form.name.value,
        email: form.email.value,
        phone: form.phone.value,
        message: form.message.value,
      };

      form.querySelector('button').textContent = 'Sending...';

      const response = await fetch('/api/contact', {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: {'Content-Type': 'application/json'},
      });

      if (response.ok) {
        form.reset();
        alert('Sent! We have emailed you confirmation and received your request.');
      } else {
        const err = await response.json();
        alert('Send failed: ' + (err.error || 'Unknown error'));
      }

      form.querySelector('button').textContent = 'Send Request';
    });
  </script>
</body>
</html>
